weapon_design_task:
  description: >
    阅读以下由“世界观设定局”提供的背景资料：
    
    {world_lore}

    针对资料中提及的每一个异世界，严格设计出 3 把武器（共计 3 * 世界数量 把武器）。
    对于每把武器，必须提供以下客观描述：
    - 武器名称（需符合该世界风格）
    - 物理尺寸与重量
    - 核心材质与能量源
    - 运作原理与杀伤机制
    - 固有缺陷或使用风险
  expected_output: >
    一份详细的武器设计草案列表，按世界观分类，每个世界包含 3 把武器的纯客观描述。
  agent: lead_weapon_engineer

prompt_generation_task:
  description: >
    接收首席兵器工程师提交的《武器设计草案》。
    为每一把武器撰写一段用于 AI 绘图的“简体中文自然语言提示词（Prompt）”。
    
    【提示词撰写规则】：
    1. 必须包含具体的画面主体、材质细节、背景环境、光影氛围（如：8k分辨率, 虚幻引擎渲染, 电影级打光）。
    2. 必须在提示词的结尾，根据该武器的形态，推荐一个最合适的画面比例（仅限 1:1, 4:3, 16:9, 或 9:16），并说明推荐理由。例如：“画面比例：16:9（适合展示长柄武器的横向张力）”。
  expected_output: >
    在原有的武器草案基础上，为每一把武器新增了对应的【中文生图 Prompt】和【推荐画面比例】。
  agent: visual_prompt_architect

catalog_compilation_task:
  description: >
    接收包含客观描述和绘图提示词的所有数据。
    将这些数据整理并排版成一份标准的 Markdown 报告。
    
    【排版强制要求】：
    - 顶级标题使用 `# 概念军工署：跨次元武器图鉴`
    - 每个世界观使用 `## 世界观：[名称]`
    - 每把武器使用 `### 武器：[名称]`
    - 武器内容必须清晰分为两块：`**客观参数**` 和 `**美术生图指令**`。
  expected_output: >
    一份排版完美、可直接交付的 Markdown 格式的最终武器图鉴。
  agent: catalog_compiler
  output_file: report.md