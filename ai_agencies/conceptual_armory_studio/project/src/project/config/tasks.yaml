create_multiverse_armory_draft_task:
  description: >
    你只读取 NLA 的报告文本（{world_lore}），为其中每一个宇宙设计单兵武器体系。
    本任务强调最大创造力与想象力，不做 Bible 字段收敛。

    输出必须是单一 Markdown 文档，并严格遵守层级：
    - `##` 二级标题：宇宙名称（每个宇宙一个 section）
    - `###` 三级标题：该宇宙下的武器分类
    - `####` 四级标题：该分类下的具体武器名称

    每个具体武器下可自由描述核心概念、运作方式、战术用途、风险等，但禁止营销、价格、导购、图像提示词。
    仅允许单兵武器，禁止载具与平台级武装。
  expected_output: >
    一份“多宇宙军械创作稿”Markdown，覆盖 report 中全部宇宙，且满足 `##`/`###`/`####` 层级结构。
  agent: universe_armory_creator

normalize_and_compile_armory_task:
  description: >
    读取 Bible 契约（{cas_weapons_bible}），并接收上一步创作稿。
    NLA 世界观一致性以创作稿中的宇宙结构与法则为准，不得改写宇宙基本法则。
    在保留创意核心的前提下，完成收敛整理与统一排版，输出最终 report.md。

    约束：
    - 保持 `##` = 宇宙名，`###` = 武器分类，`####` = 具体武器名
    - 清理营销/价格/导购/图像提示词
    - 保证每把武器描述客观、自洽，符合该宇宙法则与禁忌
    - 按 Bible 精神做语义去重与规范化，不机械改写到失去创意
  expected_output: >
    一个名为 report.md 的最终 Markdown 文档：结构统一、语义清晰、可交付。
  agent: armory_contract_editor
  output_file: report.md