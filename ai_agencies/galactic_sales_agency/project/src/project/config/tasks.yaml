basic_merchandising_task:
  description: >
    阅读以下来自军工研发部门 (CAS) 的武器客观物理描述与参数：

    {weapon_data}

    针对列表中的每一把武器，进行“数据富化 (Data Enrichment)”，生成用于电商前端展示的基础数据卡片。
    对于每一把武器，你必须严格输出以下 4 项核心商业信息：
    
    1. 商业花名 (Product Title)：抛弃实验室里的工程代号，起一个极具废土或科幻色彩、能让人记住的霸气商品名。
    2. 销售短评 (Short Description)：概括其核心用途或适用场景，语言要精准勾起特定人群的购买欲（限制在 50 字以内）。
    3. 市场定价 (Price)：根据其杀伤力、材质稀有度，给出一个符合设定的虚拟货币价格（例如：800 信用点、50,000 星币）。
    4. 核心卖点 (Key Features)：将枯燥的物理参数（如重量、尺寸、运作原理）提炼翻译为 3 条对买家最有价值的商品特色。
    
  expected_output: >
    一份排版极度整洁的 Markdown 格式商品目录。
    按武器分别列出区块，确保“商业花名”、“销售短评”、“市场定价”和“核心卖点”四个维度清晰可辨，方便后续的数据清洗脚本进行正则提取或 JSON 化。
  agent: ecommerce_merchandiser
  output_file: output/report.md