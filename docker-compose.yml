services:
  nexus-lore-agency:
    build:
      context: ./ai_agencies/nexus_lore_agency
      dockerfile: dockerfile
    container_name: nexus_lore_agency
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./ai_agencies/nexus_lore_agency:/workspace  # 仅挂载当前外包公司目录
    command: ["sleep", "infinity"]

  conceptual-armory-studio:
    build:
      context: ./ai_agencies/conceptual_armory_studio
      dockerfile: dockerfile
    container_name: conceptual_armory_studio
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./ai_agencies/conceptual_armory_studio:/workspace
    command: ["sleep", "infinity"]

  visual-forge-studio:
    build:
      context: ./ai_agencies/visual_forge_studio
      dockerfile: dockerfile
    container_name: visual_forge_studio
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./ai_agencies/visual_forge_studio:/workspace
    command: ["sleep", "infinity"]

  galactic-sales-agency:
    build:
      context: ./ai_agencies/galactic_sales_agency
      dockerfile: dockerfile
    container_name: galactic_sales_agency
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./ai_agencies/galactic_sales_agency:/workspace
    command: ["sleep", "infinity"]

  data-harmonization-system:
    build:
      context: ./ai_agencies/data_harmonization_system
